<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aria — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --border2:   #2a2a3e;
      --accent:    #7c6aff;
      --accent2:   #a78bfa;
      --accent-glow: rgba(124,106,255,0.18);
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --user-bg:   #1a1a2e;
      --ai-bg:     #13131f;
      --danger:    #ff4f6a;
      --success:   #34d399;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── AUTH ── */
    #auth-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 100;
    }
    .auth-glow {
      position: absolute; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .auth-box {
      position: relative; width: 400px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 16px; padding: 40px; animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-logo {
      font-family: var(--font-head); font-size: 28px; font-weight: 800;
      letter-spacing: -1px; margin-bottom: 4px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .tab-row {
      display: flex; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 10px; background: transparent; border: none;
      color: var(--muted); font-family: var(--font-mono); font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .field input {
      width: 100%; padding: 11px 14px; background: var(--bg);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      outline: none; transition: border 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .auth-err { color: var(--danger); font-size: 12px; margin-bottom: 12px; min-height: 16px; }
    .btn-primary {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-family: var(--font-head);
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── APP ── */
    #app { display: none; height: 100vh; flex-direction: row; }
    #app.visible { display: flex; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px; min-width: 260px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 0;
    }
    .sidebar-logo {
      font-family: var(--font-head); font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px; padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-logo span {
      display: block; font-size: 10px; font-family: var(--font-mono);
      color: var(--muted); -webkit-text-fill-color: var(--muted);
      font-weight: 400; margin-top: 2px;
    }
    .new-chat-btn {
      margin: 16px; padding: 10px 14px;
      background: var(--accent-glow); border: 1px solid var(--accent);
      border-radius: 8px; color: var(--accent2); font-family: var(--font-mono);
      font-size: 12px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .new-chat-btn:hover { background: var(--accent); color: #fff; }
    .sessions-label {
      padding: 0 20px 8px; font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    #sessions-list { flex: 1; overflow-y: auto; padding: 0 10px; }

    /* ── SESSION ITEM with delete ── */
    .session-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      font-size: 12px; color: var(--muted); transition: all 0.15s;
      display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
      position: relative;
    }
    .session-item:hover { background: var(--border); color: var(--text); }
    .session-item.active { background: var(--accent-glow); color: var(--accent2); border: 1px solid var(--border2); }
    .session-name {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .session-item.active .session-dot { background: var(--accent); }
    .session-delete {
      display: none; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 13px;
      padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .session-item:hover .session-delete { display: block; }
    .session-delete:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 16px 20px 0; border-top: 1px solid var(--border); margin-top: auto;
    }
    .user-pill {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 11px; font-weight: 800;
      color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 12px; color: var(--text); flex: 1; }
    .logout-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 2px; transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ── CHAT AREA ── */
    #chat-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg);
    }

    #no-session {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 16px;
    }
    .no-session-icon { font-size: 40px; opacity: 0.2; }
    .no-session-text {
      font-family: var(--font-head); font-size: 16px;
      font-weight: 600; opacity: 0.3;
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 24px 0;
      display: none; flex-direction: column; gap: 4px;
    }
    #messages.visible { display: flex; }

    .msg-row {
      display: flex; padding: 6px 24px; animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* FIX: user aligns right, ai aligns left */
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    /* FIX: wrapper must be block, not flex, so label + bubble stack vertically */
    .msg-row .msg-content {
      max-width: 68%;
      display: flex;
      flex-direction: column;
    }

    .msg-row.user .msg-content { align-items: flex-end; }
    .msg-row.ai   .msg-content { align-items: flex-start; }

    .msg-bubble {
      padding: 12px 16px; border-radius: 14px;
      font-size: 13.5px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-row.user .msg-bubble {
      background: var(--user-bg); border: 1px solid var(--border2);
      border-bottom-right-radius: 4px; color: var(--text);
    }
    .msg-row.ai .msg-bubble {
      background: var(--ai-bg); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .msg-label {
      font-size: 10px; color: var(--muted); margin-bottom: 4px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .typing-cursor {
      display: inline-block; width: 2px; height: 14px;
      background: var(--accent); margin-left: 2px;
      vertical-align: middle; animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* ── SUGGESTIONS ── */
    #suggestions-bar {
      padding: 0 24px 12px; display: none; flex-wrap: wrap; gap: 8px;
    }
    #suggestions-bar.visible { display: flex; }
    .suggestion-chip {
      padding: 6px 12px; background: var(--surface);
      border: 1px solid var(--border2); border-radius: 20px;
      font-size: 11.5px; color: var(--muted); cursor: pointer;
      transition: all 0.2s; font-family: var(--font-mono);
    }
    .suggestion-chip:hover {
      border-color: var(--accent); color: var(--accent2);
      background: var(--accent-glow);
    }

    /* ── INPUT ── */
    #input-area { padding: 12px 20px 20px; border-top: 1px solid var(--border); }
    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 12px; padding: 10px 12px; transition: border 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      resize: none; max-height: 120px; line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 34px; height: 34px; border-radius: 8px; background: var(--accent);
      border: none; color: #fff; font-size: 15px; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .input-hint {
      text-align: center; font-size: 10px; color: var(--muted);
      margin-top: 8px; opacity: 0.5;
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-glow"></div>
  <div class="auth-box">
    <div class="auth-logo">Aria</div>
    <div class="auth-sub">Your intelligent AI assistant</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
      <div class="auth-err" id="login-err"></div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>Username</label><input type="text" id="reg-username" placeholder="siddhraj"/></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="••••••••"/></div>
      <div class="auth-err" id="reg-err"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <div class="sidebar-logo">Aria<span>AI Assistant</span></div>
    <button class="new-chat-btn" onclick="startNewChat()"><span>+</span> New Chat</button>
    <div class="sessions-label">Recent Chats</div>
    <div id="sessions-list"></div>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-name" id="user-name-display">User</div>
        <button class="logout-btn" onclick="doLogout()" title="Logout">⏻</button>
      </div>
    </div>
  </div>

  <div id="chat-area">
    <div id="no-session">
      <div class="no-session-icon">💬</div>
      <div class="no-session-text">Select or create a chat</div>
    </div>
    <div id="messages"></div>
    <div id="suggestions-bar"></div>
    <div id="input-area" style="display:none">
      <div class="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="Ask Aria anything..."></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let currentUser = null;
  let currentSessionId = null;
  let isStreaming = false;
  let pendingNewChat = false; // true when new chat created but no message sent yet

  // ── AUTH ──
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='login')));
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pass').value;
    const errEl    = document.getElementById('reg-err');
    if (!username || !email || !password) { errEl.textContent = 'All fields required'; return; }
    try {
      const res  = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,email,password}) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || 'Registration failed'; return; }
      errEl.style.color = 'var(--success)';
      errEl.textContent = 'Account created! Please login.';
      setTimeout(() => switchTab('login'), 1200);
    } catch { errEl.textContent = 'Server error. Is the backend running?'; }
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;
    const errEl    = document.getElementById('login-err');
    if (!email || !password) { errEl.textContent = 'All fields required'; return; }
    try {
      const res  = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || 'Login failed'; return; }
      currentUser = { id: data.user_id, username: data.username };
      localStorage.setItem('aria_user', JSON.stringify(currentUser));
      enterApp();
    } catch { errEl.textContent = 'Server error. Is the backend running?'; }
  }

  function doLogout() {
    currentUser = null; currentSessionId = null; pendingNewChat = false;
    localStorage.removeItem('aria_user');
    document.getElementById('app').classList.remove('visible');
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value  = '';
    document.getElementById('login-err').textContent = '';
  }

  function enterApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-name-display').textContent = currentUser.username;
    document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase();
    loadSessions();
  }

  // ── SESSIONS ──
  async function loadSessions() {
    try {
      const res  = await fetch(`${API}/sessions/${currentUser.id}`);
      const data = await res.json();
      renderSessions(data.sessions || []);
    } catch {}
  }

  function renderSessions(sessions) {
    const list = document.getElementById('sessions-list');
    list.innerHTML = '';
    if (!sessions.length) {
      list.innerHTML = '<div style="padding:12px 16px;font-size:11px;color:var(--muted);opacity:0.5">No chats yet</div>';
      return;
    }
    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      el.dataset.id = s.id;
      el.innerHTML = `
        <div class="session-dot"></div>
        <div class="session-name">${escapeHtml(s.session_name)}</div>
        <button class="session-delete" title="Delete chat" onclick="deleteSession(event, ${s.id})">✕</button>`;
      el.onclick = (e) => { if (!e.target.classList.contains('session-delete')) selectSession(s.id, s.session_name); };
      list.appendChild(el);
    });
  }

  // ── DELETE SESSION ──
  async function deleteSession(e, sessionId) {
    e.stopPropagation();
    if (!confirm('Delete this chat?')) return;  // ← add this line
    try {
      await fetch(`${API}/sessions/${sessionId}`, { method: 'DELETE' });
      if (currentSessionId === sessionId) {
        currentSessionId = null;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('messages').classList.remove('visible');
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('no-session').style.display = 'flex';
        document.getElementById('suggestions-bar').classList.remove('visible');
      }
      await loadSessions();
    } catch {}
  }

  async function selectSession(sessionId, sessionName) {
    currentSessionId = sessionId;
    pendingNewChat = false;
    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.id) === sessionId);
    });
    document.getElementById('no-session').style.display = 'none';
    document.getElementById('messages').classList.add('visible');
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('messages').innerHTML = '';
    document.getElementById('suggestions-bar').classList.remove('visible');
    try {
      const res  = await fetch(`${API}/history/${sessionId}`);
      const data = await res.json();
      data.messages.forEach(m => appendMessage(m.role === 'user' ? 'user' : 'ai', m.content));
      scrollToBottom();
    } catch {}
  }

  // ── NEW CHAT (auto-named from first message) ──
  function startNewChat() {
    pendingNewChat = true;
    currentSessionId = null;
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    document.getElementById('no-session').style.display = 'none';
    document.getElementById('messages').classList.add('visible');
    document.getElementById('messages').innerHTML = '';
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('suggestions-bar').classList.remove('visible');
    document.getElementById('msg-input').focus();
  }

  // ── MESSAGES ──
  function appendMessage(role, content) {
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const label = role === 'user' ? (currentUser?.username || 'You') : 'Aria';
    // FIX: use msg-content wrapper so label stacks above bubble, not beside it
    row.innerHTML = `
      <div class="msg-content">
        <div class="msg-label">${label}</div>
        <div class="msg-bubble">${marked.parse(content)}</div>
      </div>`;
    messages.appendChild(row);
    return row;
  }

  function appendStreamingMessage() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<span class="typing-cursor"></span>';
  const content = document.createElement('div');
  content.className = 'msg-content';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Aria';
  content.appendChild(label);
  content.appendChild(bubble);
  row.appendChild(content);
  messages.appendChild(row);
  scrollToBottom();
  return bubble;  // return the actual element, not getElementById
}

  function escapeHtml(text) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    if (isStreaming) return;
    const input   = document.getElementById('msg-input');
    const message = input.value.trim();
    if (!message) return;

    if (pendingNewChat) {
      const sessionName = message.length > 40 ? message.slice(0, 40) + '…' : message;
      try {
        const res  = await fetch(`${API}/sessions/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUser.id, session_name: sessionName })
        });
        const data = await res.json();
        currentSessionId = data.session_id;
        pendingNewChat = false;
        await loadSessions();
        document.querySelectorAll('.session-item').forEach(el => {
          el.classList.toggle('active', parseInt(el.dataset.id) === currentSessionId);
        });
      } catch {
        appendMessage('ai', 'Could not create session. Is the backend running?');
        return;
      }
    }

    if (!currentSessionId) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('suggestions-bar').classList.remove('visible');

    appendMessage('user', message);
    scrollToBottom();

    isStreaming = true;
    document.getElementById('send-btn').disabled = true;

    const bubble = appendStreamingMessage();
    let fullResponse = '';
    let streamDone   = false;

    const url = `${API}/chat/stream?session_id=${currentSessionId}&user_id=${currentUser.id}&message=${encodeURIComponent(message)}`;
    const evtSource = new EventSource(url);

    evtSource.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.error) {
          bubble.textContent = 'Error: ' + data.error;
          evtSource.close();
          finishStreaming(fullResponse);
          return;
        }
        if (data.token) {
          fullResponse += data.token;
          bubble.innerHTML = escapeHtml(fullResponse) + '<span class="typing-cursor"></span>';
          scrollToBottom();
        }
        if (data.done) {
  streamDone = true;
  bubble.innerHTML = marked.parse(data.full_response || fullResponse);  // changed from textContent
  evtSource.close();
  finishStreaming(data.full_response || fullResponse);
}
      } catch { /* skip bad chunk */ }
    };

    evtSource.onerror = () => {
      evtSource.close();
      if (!streamDone && !fullResponse) {
        setTimeout(() => {
          bubble.textContent = 'Connection error. Is the backend running?';
          finishStreaming('');
        }, 300);
      }
    };
  }

  async function finishStreaming(response) {
  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
  // Don't await — let suggestions load in background without blocking anything
  if (response) loadSuggestions(response);
}

async function loadSuggestions(response) {
  const savedSessionId = currentSessionId; // capture current session at call time
  try {
    const res  = await fetch(`${API}/suggestions`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ response })
    });
    const data = await res.json();
    // Only render if we're still in the same session
    if (currentSessionId === savedSessionId) {
      renderSuggestions(data.suggestions || []);
    }
  } catch {}
}

  function renderSuggestions(suggestions) {
    const bar = document.getElementById('suggestions-bar');
    bar.innerHTML = '';
    if (!suggestions.length) return;
    suggestions.forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'suggestion-chip';
      chip.textContent = s;
      chip.onclick = () => { document.getElementById('msg-input').value = s; sendMessage(); };
      bar.appendChild(chip);
    });
    bar.classList.add('visible');
  }

  // ── KEYBOARD ──
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('msg-input');
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    const saved = localStorage.getItem('aria_user');
    if (saved) { currentUser = JSON.parse(saved); enterApp(); }
  });
</script>
</body>
